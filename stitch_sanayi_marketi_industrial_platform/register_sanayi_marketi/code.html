<!DOCTYPE html>

<html class="light" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kayıt Ol - Sanayi Marketi</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary": "#ffffff",
                        "tertiary-fixed-dim": "#6bd8cb",
                        "secondary-fixed-dim": "#b8c4ff",
                        "on-surface": "#111c2d",
                        "tertiary": "#006058",
                        "primary-container": "#2563eb",
                        "inverse-surface": "#263143",
                        "surface-container-highest": "#d8e3fb",
                        "on-tertiary-container": "#b3fff3",
                        "surface-container": "#e7eeff",
                        "on-surface-variant": "#434655",
                        "surface-bright": "#f9f9ff",
                        "on-tertiary": "#ffffff",
                        "tertiary-container": "#007b71",
                        "outline-variant": "#c3c6d7",
                        "on-tertiary-fixed": "#00201d",
                        "error": "#ba1a1a",
                        "outline": "#737686",
                        "secondary": "#3755c3",
                        "surface-container-high": "#dee8ff",
                        "primary": "#004ac6",
                        "primary-fixed-dim": "#b4c5ff",
                        "surface-container-low": "#f0f3ff",
                        "secondary-fixed": "#dde1ff",
                        "inverse-on-surface": "#ecf1ff",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed-variant": "#005049",
                        "surface-container-lowest": "#ffffff",
                        "error-container": "#ffdad6",
                        "surface-variant": "#d8e3fb",
                        "on-secondary-fixed": "#001453",
                        "tertiary-fixed": "#89f5e7",
                        "surface-dim": "#cfdaf2",
                        "on-secondary-container": "#00217a",
                        "on-secondary-fixed-variant": "#173bab",
                        "surface-tint": "#0053db",
                        "on-background": "#111c2d",
                        "surface": "#f9f9ff",
                        "background": "#f9f9ff",
                        "on-error": "#ffffff",
                        "secondary-container": "#708cfd",
                        "on-secondary": "#ffffff",
                        "on-primary-container": "#eeefff",
                        "inverse-primary": "#b4c5ff",
                        "primary-fixed": "#dbe1ff",
                        "on-primary-fixed": "#00174b",
                        "on-primary-fixed-variant": "#003ea8"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {},
                    "fontFamily": {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, h5, h6, .font-headline { font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center p-4">
<!-- TopNavBar (Suppressed for Transactional Page) -->
<header class="w-full absolute top-0 left-0 p-8 flex justify-center md:justify-start">
<a class="text-2xl font-black font-headline text-on-surface flex items-center gap-2" href="#">
<span class="material-symbols-outlined text-primary" data-icon="precision_manufacturing" style="font-variation-settings: 'FILL' 1;">precision_manufacturing</span>
            Sanayi Marketi
        </a>
</header>
<main class="w-full max-w-lg mt-16 md:mt-0">
<!-- Register Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0_20px_40px_rgba(17,28,45,0.06)] overflow-hidden">
<div class="p-8 sm:p-12">
<div class="text-center mb-8">
<h1 class="font-headline font-bold text-[2rem] text-on-surface tracking-tight mb-2">Kayıt Ol</h1>
<p class="font-body text-on-surface-variant">Endüstriyel çözümler merkezine katılın.</p>
</div>
<!-- Role Selector -->
<div class="mb-8">
<span class="block font-label text-[0.75rem] font-medium text-on-surface-variant mb-3 uppercase tracking-wider">Hesap Türü</span>
<div class="grid grid-cols-2 gap-4">
<!-- Basic User (Active) -->
<label class="relative cursor-pointer group">
<input checked="" class="peer sr-only" name="account_type" type="radio" value="BASIC_USER"/>
<div class="h-full p-4 rounded-lg bg-surface-container-high border-2 border-primary transition-all text-center">
<span class="material-symbols-outlined text-primary mb-2 text-3xl" data-icon="person">person</span>
<span class="block font-body font-bold text-primary text-sm">Bireysel Kullanıcı</span>
</div>
</label>
<!-- Company User (Inactive) -->
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="account_type" type="radio" value="COMPANY_USER"/>
<div class="h-full p-4 rounded-lg bg-surface-container-low border border-outline-variant/15 peer-checked:bg-surface-container-high peer-checked:border-2 peer-checked:border-primary transition-all text-center hover:bg-surface-container">
<span class="material-symbols-outlined text-on-surface-variant peer-checked:text-primary mb-2 text-3xl" data-icon="factory">factory</span>
<span class="block font-body font-semibold text-on-surface-variant peer-checked:text-primary text-sm">Firma Kullanıcısı</span>
</div>
</label>
</div>
<!-- Conditional Note (Simulated Visibility) -->
<div class="mt-3 p-3 bg-inverse-on-surface rounded-md flex items-start gap-2 border border-outline-variant/15 hidden">
<span class="material-symbols-outlined text-secondary text-sm mt-0.5" data-icon="info">info</span>
<p class="font-body text-xs text-on-surface-variant leading-relaxed">Firma başvurunuzu kayıt sonrası yapabilirsiniz.</p>
</div>
</div>
<!-- Registration Form -->
<form class="space-y-5">
<div>
<label class="block font-label text-[0.75rem] font-medium text-on-surface mb-1.5 uppercase tracking-wider" for="fullName">Ad Soyad</label>
<input class="w-full bg-surface-container-low border border-outline-variant/15 text-on-surface rounded-md px-4 py-3 font-body focus:ring-2 focus:ring-primary focus:border-primary focus:bg-surface-container-lowest transition-colors outline-none" id="fullName" placeholder="Örn: Ahmet Yılmaz" required="" type="text"/>
</div>
<div>
<label class="block font-label text-[0.75rem] font-medium text-on-surface mb-1.5 uppercase tracking-wider" for="email">E-posta</label>
<input class="w-full bg-surface-container-low border border-outline-variant/15 text-on-surface rounded-md px-4 py-3 font-body focus:ring-2 focus:ring-primary focus:border-primary focus:bg-surface-container-lowest transition-colors outline-none" id="email" placeholder="ornek@sirket.com" required="" type="email"/>
</div>
<div>
<label class="block font-label text-[0.75rem] font-medium text-on-surface mb-1.5 uppercase tracking-wider" for="password">Şifre</label>
<div class="relative">
<input class="w-full bg-surface-container-low border border-outline-variant/15 text-on-surface rounded-md px-4 py-3 font-body focus:ring-2 focus:ring-primary focus:border-primary focus:bg-surface-container-lowest transition-colors outline-none pr-10" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 px-3 flex items-center text-on-surface-variant hover:text-on-surface" type="button">
<span class="material-symbols-outlined text-lg" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div>
<label class="block font-label text-[0.75rem] font-medium text-on-surface mb-1.5 uppercase tracking-wider" for="passwordConfirm">Şifre Tekrar</label>
<input class="w-full bg-surface-container-low border border-outline-variant/15 text-on-surface rounded-md px-4 py-3 font-body focus:ring-2 focus:ring-primary focus:border-primary focus:bg-surface-container-lowest transition-colors outline-none" id="passwordConfirm" placeholder="••••••••" required="" type="password"/>
</div>
<div class="flex items-start gap-2 pt-2 pb-4">
<input class="mt-1 rounded border-outline-variant text-primary focus:ring-primary bg-surface-container-lowest" id="terms" required="" type="checkbox"/>
<label class="font-body text-xs text-on-surface-variant leading-relaxed" for="terms">
<a class="text-primary hover:underline font-medium" href="#">Hizmet Şartları</a>'nı ve <a class="text-primary hover:underline font-medium" href="#">Gizlilik Politikası</a>'nı okudum ve kabul ediyorum.
                        </label>
</div>
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-body font-bold rounded-xl py-3.5 px-6 hover:shadow-[0_10px_20px_rgba(37,99,235,0.2)] transition-all active:scale-[0.98] flex items-center justify-center gap-2" type="submit">
                        Kayıt Ol
                        <span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
</div>
<!-- Card Footer -->
<div class="bg-surface-container-low p-6 text-center border-t border-outline-variant/15">
<p class="font-body text-sm text-on-surface-variant">
                    Zaten hesabınız var mı? 
                    <a class="text-primary font-bold hover:text-primary-container transition-colors ml-1" href="#">Giriş yapın</a>
</p>
</div>
</div>
<!-- Decorative subtle elements -->
<div class="mt-8 text-center flex justify-center gap-4 text-on-surface-variant/60">
<span class="material-symbols-outlined" data-icon="security">security</span>
<span class="material-symbols-outlined" data-icon="verified_user">verified_user</span>
<span class="material-symbols-outlined" data-icon="encrypted">encrypted</span>
</div>
</main>
<!-- Footer (Suppressed for Transactional Page, leaving minimal copyright) -->
<footer class="w-full mt-auto py-6 text-center">
<p class="font-label text-xs text-on-surface-variant/60">© 2024 Sanayi Marketi - Endüstriyel Çözümler Merkezi</p>
</footer>
</body></html>
